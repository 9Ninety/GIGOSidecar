# fly.toml app configuration file generated for gigo-sidecar on 2026-04-12T15:03:56+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gigo-sidecar'
primary_region = 'nrt'

[processes]
  app = "node --experimental-strip-types src/server.ts -p 8080 --expose"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
